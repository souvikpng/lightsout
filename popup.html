<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LightsOut - Reader Mode</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <div>
        <p class="eyebrow">Reader mode</p>
        <h1>LightsOut</h1>
      </div>

      <label class="switch" for="toggle">
        <input id="toggle" type="checkbox" role="switch" aria-label="Toggle dark reader mode">
        <span class="slider" aria-hidden="true"></span>
      </label>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
